services:
  catalog-api:
    build:
      context: ./services/catalog-api
    container_name: prism-testbed-catalog-api
    environment:
      SERVICE_NAME: catalog-api
      SERVICE_VERSION: v1
      REGION: us-central
      ENVIRONMENT: testbed
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql://postgres:postgres@postgres:5432/app
    ports:
      - "8081:8000"

  catalog-api-v2:
    build:
      context: ./services/catalog-api
    container_name: prism-testbed-catalog-api-v2
    environment:
      SERVICE_NAME: catalog-api
      SERVICE_VERSION: v2
      REGION: us-east
      ENVIRONMENT: testbed
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql://postgres:postgres@postgres:5432/app
    ports:
      - "8083:8000"

  worker-sim:
    build:
      context: ./services/worker-sim
    container_name: prism-testbed-worker-sim
    environment:
      SERVICE_NAME: worker-sim
      REGION: us-central
      ENVIRONMENT: testbed
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql://postgres:postgres@postgres:5432/app
    ports:
      - "8082:8000"

  gateway:
    image: nginx:1.27-alpine
    container_name: prism-testbed-gateway
    ports:
      - "8080:8080"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - catalog-api
      - catalog-api-v2

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.3.0
    container_name: prism-testbed-nginx-exporter
    command:
      - --nginx.scrape-uri=http://gateway:8080/stub_status
    ports:
      - "9113:9113"
    depends_on:
      - gateway

  redis:
    image: redis:7.4-alpine
    container_name: prism-testbed-redis
    ports:
      - "6379:6379"

  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    container_name: prism-testbed-redis-exporter
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"
    depends_on:
      - redis

  postgres:
    image: postgres:16-alpine
    container_name: prism-testbed-postgres
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: prism-testbed-postgres-exporter
    environment:
      DATA_SOURCE_NAME: postgresql://postgres:postgres@postgres:5432/app?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      - postgres

  traffic-generator:
    build:
      context: ./services/traffic-generator
    container_name: prism-testbed-traffic-generator
    environment:
      GATEWAY_BASE_URL: http://gateway:8080
      WORKER_BASE_URL: http://worker-sim:8000
    depends_on:
      - gateway
      - worker-sim

volumes:
  postgres-data:
