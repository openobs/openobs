events {}

http {
  split_clients "${remote_addr}${request_id}" $canary_split {
    15% "canary";
    * "stable";
  }

  map $http_x_canary $target_upstream {
    default $canary_split;
    "always" "canary";
    "never" "stable";
  }

  upstream stable {
    server catalog-api:8000;
  }

  upstream canary {
    server catalog-api-v2:8000;
  }

  server {
    listen 8080;
    server_name _;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    location = /stub_status {
      stub_status;
      access_log off;
      allow all;
    }

    location /healthz {
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }

    location / {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Canary-Target $target_upstream;
      proxy_pass http://$target_upstream;
    }
  }
}
