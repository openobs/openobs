apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-api-v1
  namespace: agentic-obs-testbed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-api
      version: v1
  template:
    metadata:
      labels:
        app: catalog-api
        version: v1
    spec:
      containers:
        - name: catalog-api
          image: ghcr.io/placeholder/catalog-api:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: SERVICE_NAME
              value: catalog-api
            - name: SERVICE_VERSION
              value: v1
            - name: REGION
              value: us-central
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
---
