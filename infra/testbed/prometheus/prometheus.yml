global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: catalog-api
    static_configs:
      - targets: ["catalog-api:8000"]

  - job_name: worker-sim
    static_configs:
      - targets: ["worker-sim:8000"]

  - job_name: gateway
    static_configs:
      - targets: ["nginx-exporter:9113"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
