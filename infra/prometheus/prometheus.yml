global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: testbed-catalog-api
    static_configs:
      - targets: ["host.docker.internal:8081"]

  - job_name: testbed-catalog-api-v2
    static_configs:
      - targets: ["host.docker.internal:8083"]

  - job_name: testbed-worker-sim
    static_configs:
      - targets: ["host.docker.internal:8082"]

  - job_name: testbed-nginx-gateway
    static_configs:
      - targets: ["host.docker.internal:9113"]

  - job_name: testbed-redis
    static_configs:
      - targets: ["host.docker.internal:9121"]

  - job_name: testbed-postgres
    static_configs:
      - targets: ["host.docker.internal:9187"]
