name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog from commits
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s" HEAD)
          else
            NOTES=$(git log --pretty=format:"- %s" "${PREV_TAG}..HEAD")
          fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        id: gh_release
        with:
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.notes }}

            ---
            **Docker image:** `ghcr.io/${{ github.repository }}:${{ github.ref_name }}`

            **Helm chart (OCI):**
            ```bash
            helm upgrade --install openobs \
              oci://ghcr.io/${{ github.repository }}/charts/openobs \
              --version ${{ github.ref_name }} \
              --set image.tag=${{ github.ref_name }}
            ```

            **Helm chart (tarball):** attached as `openobs-${{ github.ref_name }}.tgz` below.
          generate_release_notes: true

  helm-publish:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Compute chart version from tag
        id: ver
        run: |
          # Strip leading 'v' from tag — Helm chart versions are semver
          # without the prefix (`1.2.3`, not `v1.2.3`).
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Stamp chart version + appVersion
        run: |
          sed -i "s/^version: .*/version: ${{ steps.ver.outputs.version }}/" helm/openobs/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"${{ steps.ver.outputs.version }}\"/" helm/openobs/Chart.yaml
          cat helm/openobs/Chart.yaml

      - name: Package chart
        run: |
          helm package helm/openobs -d dist/

      - name: Log in to GHCR for OCI push
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push to OCI registry (ghcr.io)
        run: |
          # Owner path is lowercased for ghcr OCI.
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          helm push dist/openobs-${{ steps.ver.outputs.version }}.tgz \
            oci://ghcr.io/$OWNER/charts

      - name: Attach chart tarball to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/openobs-${{ steps.ver.outputs.version }}.tgz
